version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: young_investors
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DEBUG: "True"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/young_investors
      SECRET_KEY: dev-secret-key-change-in-production
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      DEFAULT_FROM_EMAIL: noreply@younginvestors.co
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
